<!DOCTYPE html>
<html>
<head>
<title>Payment Successful</title>

<style>
body{
  font-family:Segoe UI, Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  text-align:center;
}

/* CHECKMARK */
.checkmark-circle{
  width:100px;
  height:100px;
  border-radius:50%;
  border:4px solid #28a745;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:pop 0.4s ease;
  background:white;
  box-shadow:0 0 25px rgba(40,167,69,0.2);
}

.checkmark{
  width:25px;
  height:50px;
  border-right:5px solid #28a745;
  border-bottom:5px solid #28a745;
  transform:rotate(45deg);
  animation:draw 0.5s ease forwards;
}

h1{
  color:#28a745;
  margin-top:20px;
}

/* ANIMATIONS */
@keyframes pop{
  0%{transform:scale(0);}
  100%{transform:scale(1);}
}

@keyframes draw{
  0%{opacity:0; transform:rotate(45deg) scale(0.5);}
  100%{opacity:1; transform:rotate(45deg) scale(1);}
}

.return-btn{
  margin-top:18px;
  padding:10px 14px;
  border:none;
  background:transparent;
  color:#666;
  font-size:13px;
  cursor:pointer;
  opacity:0.6;
  transition:0.2s ease;
  text-decoration:underline;
}

.return-btn:hover{
  opacity:1;
  color:#28a745;
}
</style>
</head>

<body>

<div class="container">

  <div class="checkmark-circle">
    <div class="checkmark"></div>
  </div>

  <h1>Payment Successful 🎉</h1>
  <p>Thank you for your order</p>

  <!-- SUBTLE BUTTON (UNDER SUCCESS TEXT) -->
  <button onclick="goHome()" class="return-btn">
    Return to Menu
  </button>

</div>

<script> 
src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"
</script>

<script>
window.onload = () => {
  confetti({
    particleCount: 150,
    spread: 90,
    origin: { y: 0.6 }
  });
};
</script>

<script>
function goHome(){
  window.location.href = "index.html";
}
</script>
</body>
</html>
