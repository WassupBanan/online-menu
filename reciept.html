<!DOCTYPE html>
<html>
<head>
<title>ByteBites Receipt</title>

<style>
body{
  font-family:'Segoe UI', Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.box{
  max-width:420px;
  margin:auto;
  background:white;
  border-radius:20px;
  padding:22px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  color:#777;
  font-size:13px;
  margin-bottom:18px;
}

.status{
  text-align:center;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  margin-bottom:10px;
  background:#fff3cd;
  color:#856404;
}

#paidStatus{
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}

.progress{
  width:100%;
  height:12px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:20px;
}

.progress-bar{
  height:100%;
  width:10%;
  background:linear-gradient(90deg,#28a745,#5dd65d);
  transition:1s;
}

.info p{
  margin:6px 0;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  padding-bottom:8px;
  border-bottom:1px solid #f0f0f0;
}

.item-row{
  display:flex;
  justify-content:space-between;
  width:100%;
}

.summary .row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  font-size:14px;
}

.total{
  font-size:18px;
  font-weight:bold;
  margin-top:8px;
}

.btn-group{
  display:flex;
  gap:10px;
  margin-top:20px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.pay{background:#28a745;color:white;}
.more{background:#ff6b35;color:white;}

.footer{
  text-align:center;
  margin-top:18px;
  font-size:13px;
  color:#777;
}

.qr{
  text-align:center;
  margin-top:20px;
}

.qr img{
  width:120px;
}
</style>
</head>

<body>

<div class="box">

  <h2>🧾 ByteBites Café</h2>
  <div class="sub">Digital Receipt • Thank You!</div>

  <div class="status" id="status">Preparing...</div>
  <p id="paidStatus"></p>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="info">
    <p><b>Customer:</b> <span id="name"></span></p>
    <p><b>Table:</b> <span id="table"></span></p>
    <p><b>Order ID:</b> <span id="orderId"></span></p>
    <p><b>Time:</b> <span id="time"></span></p>
  </div>

  <hr>

  <div id="items"></div>

  <div id="summary"></div>

  <div class="btn-group">
    <button class="pay" onclick="pay()">💳 Pay</button>
    <button class="more" onclick="orderMore()">➕ Order More</button>
  </div>

  <div class="qr">
    <p style="font-size:12px;color:#777;">Scan to return to menu</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=index.html">
  </div>

  <div class="footer">
    ❤️ Thank you for dining with ByteBites Café
  </div>

</div>

<script>

/* =========================
   LOAD CORRECT ORDER (FIXED)
========================= */

let orderId = localStorage.getItem("lastOrderId");

let order = JSON.parse(
  localStorage.getItem("order_" + orderId) || "{}"
);

if (!order.orderId) {
  document.body.innerHTML = "<h2>No order found 😢</h2>";
}

/* =========================
   INFO
========================= */

document.getElementById("name").innerText = order.name || "Guest";
document.getElementById("table").innerText = order.table || "N/A";
document.getElementById("time").innerText = order.time || new Date().toLocaleString();
document.getElementById("orderId").innerText = order.orderId || orderId;

document.getElementById("paidStatus").innerText =
  order.paid ? "Paid ✅" : "Not Paid ❌";

/* =========================
   ITEMS + TOTAL
========================= */

let subtotal = 0;

(order.cart || []).forEach(item => {

  let qty = item.qty || 1;
 let price = item.price;
  let total = price * qty;

  subtotal += total;

  let div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <div class="item-row">
      <span>${item.name} x${qty}</span>
      <span>$${total.toFixed(2)}</span>
    </div>
  `;

  document.getElementById("items").appendChild(div);
});

/* =========================
   SUMMARY (CLEAN FORMAT FIX)
========================= */

let service = subtotal * 0.1;
let gst = (subtotal + service) * 0.09;
let final = subtotal + service + gst;

document.getElementById("summary").innerHTML = `
  <div class="summary">

    <div class="row">
      <span>Subtotal</span>
      <span>$${subtotal.toFixed(2)}</span>
    </div>

    <div class="row">
      <span>Service (10%)</span>
      <span>$${service.toFixed(2)}</span>
    </div>

    <div class="row">
      <span>GST (9%)</span>
      <span>$${gst.toFixed(2)}</span>
    </div>

    <div class="row total">
      <span>Total</span>
      <span>$${final.toFixed(2)}</span>
    </div>

  </div>
`;

/* =========================
   STATUS ANIMATION
========================= */

let status = document.getElementById("status");
let bar = document.getElementById("progressBar");

setTimeout(()=>{
  status.innerText = "Cooking 🍳";
  status.style.background = "#cce5ff";
  status.style.color = "#004085";
  bar.style.width = "60%";
},2000);

setTimeout(()=>{
  status.innerText = "Ready for Pickup ✅";
  status.style.background = "#d4edda";
  status.style.color = "#155724";
  bar.style.width = "100%";
},5000);

/* =========================
   PAY FUNCTION (FIXED)
========================= */

function pay(){

  let users = JSON.parse(localStorage.getItem("users")) || {};

  Object.values(users).forEach(user => {
    if(!user.orders) return;

    user.orders.forEach(o => {
      if(o.orderId === order.orderId){
        o.paid = true;
        o.status = "Paid";
      }
    });
  });

  localStorage.setItem("users", JSON.stringify(users));

  order.paid = true;
  localStorage.setItem("order_" + orderId, JSON.stringify(order));

  localStorage.setItem("paymentStatus", "success");

  window.location.href = "payment-success.html";
}

/* =========================
   ORDER MORE
========================= */

function orderMore(){

  let orderId = localStorage.getItem("lastOrderId");
  let order = JSON.parse(localStorage.getItem("order_" + orderId));

  if (!order) {
    window.location.href = "index.html";
    return;
  }

  // restore cart
  localStorage.setItem("cart", JSON.stringify(order.cart || []));

  // optional: restore name + table (store temporarily)
  localStorage.setItem("draftName", order.name);
  localStorage.setItem("draftTable", order.table);

  window.location.href = "index.html";
}
</script>

</body>
</html>
